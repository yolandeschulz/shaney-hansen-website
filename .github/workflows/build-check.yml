name: Build check

# Runs on every push and pull request.
# Verifies the site builds cleanly. No deployment happens here.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Upload build artifact (for preview/inspection)
        uses: actions/upload-artifact@v4
        with:
          name: site-dist
          path: dist
          retention-days: 7
